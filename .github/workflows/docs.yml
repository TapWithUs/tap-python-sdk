name: Deploy docs

# Test on this PR: the build job runs automatically on pull_request.
# Test full Pages deploy before merge: Actions → Deploy docs → Run workflow
# (select this branch). Requires Pages source = GitHub Actions in repo settings.
on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "docs/assets/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "docs/**"
      - "docs/assets/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Upload artifact and deploy to GitHub Pages"
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache MkDocs
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: mkdocs-material-${{ hashFiles('requirements-docs.txt') }}
          restore-keys: |
            mkdocs-material-

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build site
        run: mkdocs build --strict --clean

      - name: Upload Pages artifact
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
